<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="quiz-box">

            <h1>Quiz App</h1>

            <!-- Start Screen -->
            <div id="startScreen" class="screen">
                <h2>Welcome to the Quiz</h2>
                <p>Enter your name to begin</p>
                <input type="text" id="username" placeholder="Your Name">
                <button class="nav-btn" onclick="startQuiz()">Start Quiz</button>
            </div>

            <!-- Quiz Screen -->
            <div id="quizScreen" style="display:none;">
                <div id="progress"></div>
                <h2 id="question"></h2>

                <div class="buttons">
                    <button class="btn" onclick="selectAnswer(1)" id="btn1"></button>
                    <button class="btn" onclick="selectAnswer(2)" id="btn2"></button>
                    <button class="btn" onclick="selectAnswer(3)" id="btn3"></button>
                    <button class="btn" onclick="selectAnswer(4)" id="btn4"></button>
                </div>

                <div class="nav-buttons">
                    <button class="nav-btn" onclick="previousQuestion()">Previous</button>
                    <button class="nav-btn" onclick="nextQuestion()">Next</button>
                </div>
            </div>

            <!-- End Screen -->
            <div id="endScreen" style="display:none;" class="screen">
                <h2 id="finalMessage"></h2>
                <button class="nav-btn" onclick="restartQuiz()">Restart Quiz</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
